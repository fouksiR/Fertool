<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Digest Archive · Fertool</title>
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #f8f7f5 0%, #e8dfd0 100%); color: #2c2c2c; line-height: 1.6; min-height: 100vh; }

        header { padding: 1.5rem 5%; background: rgba(248,247,245,0.97); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(44,44,44,0.1); position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; color: #2c2c2c; text-decoration: none; }
        nav { display: flex; gap: 2rem; }
        nav a { color: #4a6741; text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: opacity 0.2s; }
        nav a:hover { opacity: 0.7; }

        .container { max-width: 900px; margin: 0 auto; padding: 3rem 2rem 5rem; }
        .hero { text-align: center; margin-bottom: 2.5rem; }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 400; color: #2c2c2c; margin-bottom: 0.5rem; }
        .hero p { font-size: 0.95rem; color: #888; }

        .archive-list { display: flex; flex-direction: column; gap: 1rem; }
        .week-card {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(74,103,65,0.07);
            overflow: hidden;
        }
        .week-head { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.4rem; cursor: pointer; user-select: none; }
        .week-head:hover { background: rgba(74,103,65,0.04); }
        .week-id { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; color: #2c2c2c; }
        .week-meta { font-size: 0.78rem; color: #888; }
        .week-toggle { font-size: 1rem; color: #999; transition: transform 0.2s; }
        .week-card.expanded .week-toggle { transform: rotate(180deg); }
        .week-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; padding: 0 1.4rem; }
        .week-card.expanded .week-body { max-height: 600px; padding: 0 1.4rem 1.2rem; }
        .week-headline { padding: 0.5rem 0; border-top: 1px dashed rgba(74,103,65,0.15); font-size: 0.88rem; color: #333; line-height: 1.6; }
        .week-headline:first-child { border-top: none; }

        .empty { color: #aaa; font-style: italic; text-align: center; padding: 3rem 0; }
        .load-more { display: block; margin: 2rem auto 0; padding: 0.7rem 1.8rem; background: #4a6741; color: #fff; border: none; border-radius: 10px; font-size: 0.85rem; font-weight: 500; cursor: pointer; font-family: inherit; }
        .load-more:hover { opacity: 0.88; }
        .load-more:disabled { opacity: 0.4; cursor: default; }

        .skel { height: 70px; border-radius: 14px; background: linear-gradient(90deg, rgba(0,0,0,0.04) 25%, rgba(0,0,0,0.07) 37%, rgba(0,0,0,0.04) 63%); background-size: 400% 100%; animation: skel 1.4s ease infinite; }
        @keyframes skel { 0%{background-position:100% 50%} 100%{background-position:0 50%} }
    </style>
</head>
<body>
<header>
    <div class="header-content">
        <a href="index.html" class="logo">Fertool</a>
        <nav>
            <a href="index.html">← Back to clinical support</a>
        </nav>
    </div>
</header>

<div class="container">
    <div class="hero">
        <h1>Weekly Digest Archive</h1>
        <p>Every weekly reproductive-medicine digest, reviewed and approved.</p>
    </div>

    <div class="archive-list" id="archiveList">
        <div class="skel"></div>
        <div class="skel"></div>
        <div class="skel"></div>
    </div>
    <button class="load-more" id="loadMore" style="display:none" type="button">Load older weeks</button>
</div>

<script>
var API = 'https://fertility-gp-backend-532857641879.australia-southeast2.run.app';
var listEl = document.getElementById('archiveList');
var loadMoreBtn = document.getElementById('loadMore');
var cursor = null;
var firstLoad = true;

function esc(s) {
    return (s || '').toString()
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatDate(iso) {
    if (!iso) return '';
    try {
        var d = new Date(iso);
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    } catch (e) { return ''; }
}

function renderItem(item) {
    var headlines = (item.top_headlines || []).map(function (h) {
        return '<div class="week-headline">' + esc(h) + '</div>';
    }).join('');
    if (!headlines) headlines = '<div class="week-headline" style="color:#aaa;font-style:italic">No highlights recorded.</div>';
    var meta = [esc(formatDate(item.generated_at)), (item.paper_count || 0) + ' papers']
               .filter(Boolean).join(' · ');
    return ''
      + '<div class="week-card" data-week="' + esc(item.week_id) + '">'
      +   '<div class="week-head" onclick="this.parentNode.classList.toggle(\'expanded\')">'
      +     '<div>'
      +       '<div class="week-id">Week ' + esc(item.week_id) + '</div>'
      +       '<div class="week-meta">' + meta + '</div>'
      +     '</div>'
      +     '<span class="week-toggle">▾</span>'
      +   '</div>'
      +   '<div class="week-body">' + headlines + '</div>'
      + '</div>';
}

function renderEmpty() {
    listEl.innerHTML = '<div class="empty">No approved digests yet.</div>';
}

function renderError() {
    listEl.innerHTML = '<div class="empty">Unable to load the archive right now.</div>';
}

function load() {
    var url = API + '/digest-archive?limit=20';
    if (cursor) url += '&after=' + encodeURIComponent(cursor);

    loadMoreBtn.disabled = true;
    fetch(url, { cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (d) {
          var items = (d && d.items) || [];
          if (firstLoad) {
              firstLoad = false;
              if (!items.length) { renderEmpty(); return; }
              listEl.innerHTML = items.map(renderItem).join('');
          } else {
              listEl.insertAdjacentHTML('beforeend', items.map(renderItem).join(''));
          }
          cursor = d.next_cursor;
          if (cursor) {
              loadMoreBtn.style.display = 'block';
              loadMoreBtn.disabled = false;
          } else {
              loadMoreBtn.style.display = 'none';
          }
      })
      .catch(function (err) {
          console.warn('[archive] fetch failed', err);
          if (firstLoad) renderError();
      });
}

loadMoreBtn.addEventListener('click', load);
load();
</script>
</body>
</html>
