<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Digest Archive · Fertool</title>
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #f8f7f5 0%, #e8dfd0 100%); color: #2c2c2c; line-height: 1.6; min-height: 100vh; }

        header { padding: 1.5rem 5%; background: rgba(248,247,245,0.97); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(44,44,44,0.1); position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: #2c2c2c; text-decoration: none; }
        nav a { color: #4a6741; text-decoration: none; font-size: 0.88rem; font-weight: 500; }
        nav a:hover { opacity: 0.7; }

        .container { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 5rem; }
        .hero { text-align: center; margin-bottom: 2.5rem; }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 400; color: #2c2c2c; margin-bottom: 0.5rem; }
        .hero p { font-size: 0.95rem; color: #888; }

        .week-block { margin-bottom: 3rem; }
        .week-header { display: flex; justify-content: space-between; align-items: baseline; padding: 0 0.2rem 0.8rem; border-bottom: 1px solid rgba(74,103,65,0.15); margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.6rem; }
        .week-id { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500; color: #2c2c2c; }
        .week-meta { font-size: 0.78rem; color: #888; }

        .week-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.2rem; }

        .dcard {
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(74,103,65,0.12);
            border-radius: 16px; padding: 1.3rem 1.3rem 1.1rem;
            display: flex; flex-direction: column; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            box-shadow: 0 3px 16px rgba(0,0,0,0.05);
        }
        .dcard:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(74,103,65,0.12); border-color: rgba(74,103,65,0.28); }
        .dcard-logo { height: 48px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; }
        .dcard-logo img { max-height: 48px; max-width: 110px; display: block; }
        .dcard-journal { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 1.5px; color: #a08858; text-align: center; margin-bottom: 0.8rem; font-weight: 600; }
        .dcard-title {
            font-family: 'Cormorant Garamond', serif; font-size: 1.12rem; font-weight: 500;
            color: #2c2c2c; line-height: 1.3; margin-bottom: 0.7rem;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .dcard-bottom {
            font-size: 0.82rem; color: #333; line-height: 1.55; margin-bottom: 0.7rem;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .dcard-numbers {
            background: rgba(74,103,65,0.06); border-radius: 8px; padding: 0.5rem 0.8rem;
            font-size: 0.76rem; color: #2c4a25; line-height: 1.5; margin-bottom: 0.85rem;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .dcard-readmore { margin-top: auto; font-size: 0.76rem; color: #4a6741; font-weight: 600; }

        .empty { color: #aaa; font-style: italic; text-align: center; padding: 3rem 0; }
        .load-more { display: block; margin: 2rem auto 0; padding: 0.7rem 1.8rem; background: #4a6741; color: #fff; border: none; border-radius: 10px; font-size: 0.85rem; font-weight: 500; cursor: pointer; font-family: inherit; }
        .load-more:hover { opacity: 0.88; }
        .load-more:disabled { opacity: 0.4; cursor: default; }

        .skel { height: 240px; border-radius: 16px; background: linear-gradient(90deg, rgba(0,0,0,0.04) 25%, rgba(0,0,0,0.07) 37%, rgba(0,0,0,0.04) 63%); background-size: 400% 100%; animation: skel 1.4s ease infinite; }
        @keyframes skel { 0%{background-position:100% 50%} 100%{background-position:0 50%} }

        /* Modal (shared with index.html) */
        .dmodal-back { position: fixed; inset: 0; background: rgba(30,25,20,0.55); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1.5rem; }
        .dmodal-back.open { display: flex; }
        .dmodal { background: #fff; border-radius: 18px; max-width: 760px; width: 100%; max-height: 88vh; overflow-y: auto; padding: 2.2rem 2.4rem 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.35); position: relative; font-size: 0.92rem; line-height: 1.65; }
        .dmodal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #aaa; line-height: 1; }
        .dmodal-close:hover { color: #2c2c2c; }
        .dmodal-journal { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.5px; color: #a08858; font-weight: 600; margin-bottom: 0.4rem; }
        .dmodal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; color: #2c2c2c; line-height: 1.3; font-weight: 500; margin-bottom: 0.4rem; }
        .dmodal-authors { font-size: 0.82rem; color: #888; margin-bottom: 1.4rem; }
        .dmodal-section { margin-bottom: 1.4rem; }
        .dmodal-section h4 { font-family: 'Montserrat', sans-serif; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #a08858; margin-bottom: 0.4rem; }
        .dmodal-abstract { background: rgba(74,103,65,0.05); border-left: 3px solid #4a6741; border-radius: 6px; padding: 0.9rem 1.1rem; font-size: 0.86rem; line-height: 1.7; color: #333; white-space: pre-wrap; word-break: break-word; }
        .dmodal-links { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 1.5rem; padding-top: 1.2rem; border-top: 1px solid #eee; }
        .dmodal-link { padding: 0.55rem 1.1rem; border-radius: 10px; background: #4a6741; color: #fff; text-decoration: none; font-size: 0.82rem; font-weight: 500; }
        .dmodal-link.secondary { background: rgba(74,103,65,0.1); color: #4a6741; }
        .dmodal-link:hover { opacity: 0.88; }
    </style>
</head>
<body>
<header>
    <div class="header-content">
        <a href="index.html" class="logo">Fertool</a>
        <nav><a href="index.html">← Back to clinical support</a></nav>
    </div>
</header>

<div class="container">
    <div class="hero">
        <h1>Weekly Digest Archive</h1>
        <p>Every weekly reproductive-medicine digest, published by Fertool.</p>
    </div>

    <div id="archive">
        <div class="skel"></div>
        <div class="skel" style="margin-top:1rem"></div>
    </div>
    <button class="load-more" id="loadMore" style="display:none" type="button">Load older weeks</button>
</div>

<!-- Shared modal -->
<div class="dmodal-back" id="dmodalBack" role="dialog" aria-modal="true" aria-labelledby="dmodalTitle" aria-hidden="true">
    <div class="dmodal">
        <button class="dmodal-close" id="dmodalClose" aria-label="Close">×</button>
        <div class="dmodal-journal" id="dmodalJournal"></div>
        <h3 class="dmodal-title" id="dmodalTitle"></h3>
        <div class="dmodal-authors" id="dmodalAuthors"></div>
        <div id="dmodalBody"></div>
        <div class="dmodal-links" id="dmodalLinks"></div>
    </div>
</div>

<script>
var API = 'https://fertility-gp-backend-532857641879.australia-southeast2.run.app';

var JOURNAL_LOGOS = {
    "Fertil Steril":         "fertility-sterility.svg",
    "Hum Reprod":            "human-reproduction.svg",
    "Hum Reprod Update":     "human-reproduction.svg",
    "Reprod Biomed Online":  "rbm-online.svg",
    "J Assist Reprod Genet": "jarg.svg",
    "N Engl J Med":          "nejm.svg",
    "Lancet":                "lancet.svg",
    "BMJ":                   "bmj.svg",
    "JAMA":                  "jama.svg",
    "JAMA Netw Open":        "jama-network-open.svg",
    "Am J Obstet Gynecol":   "ajog.svg",
    "Obstet Gynecol":        "obstet-gynecol.svg"
};

function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function logoFor(j){return 'assets/journals/' + (JOURNAL_LOGOS[j] || 'journal.svg');}

var WEEKS = {};     // week_id → full digest (for modal lookup)
var modal = document.getElementById('dmodalBack');
var lastFocus = null;

function openModal(weekId, idx){
    var d = WEEKS[weekId]; if (!d) return;
    var p = d.papers[idx]; if (!p) return;
    lastFocus = document.activeElement;
    var clin = p.clinician || {};
    document.getElementById('dmodalJournal').textContent = 'Abstract — from ' + (p.journal || 'Journal');
    document.getElementById('dmodalTitle').textContent   = p.title || '';
    document.getElementById('dmodalAuthors').textContent = (p.authors || '') + (p.pub_date ? ' · ' + p.pub_date : '');

    var body='';
    body += '<div class="dmodal-section"><h4>Abstract</h4><div class="dmodal-abstract">'
          + esc(p.abstract || 'No abstract available from PubMed.') + '</div></div>';
    function sec(label, text){ return text ? '<div class="dmodal-section"><h4>'+esc(label)+'</h4><div>'+esc(text)+'</div></div>' : ''; }
    body += sec('Bottom line',    clin.bottom_line);
    body += sec('Design',         clin.design);
    body += sec('Key numbers',    clin.key_numbers);
    body += sec('Limitations',    clin.limitations);
    body += sec('Practice impact', clin.practice_impact);
    document.getElementById('dmodalBody').innerHTML = body;

    var links='';
    if (p.pmid) links += '<a class="dmodal-link" href="https://pubmed.ncbi.nlm.nih.gov/'+encodeURIComponent(p.pmid)+'/" target="_blank" rel="noopener">Open on PubMed ↗</a>';
    if (p.url)  links += '<a class="dmodal-link secondary" href="'+esc(p.url)+'" target="_blank" rel="noopener">View full paper ↗</a>';
    document.getElementById('dmodalLinks').innerHTML = links;

    modal.classList.add('open');
    modal.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
    document.getElementById('dmodalClose').focus();
}
function closeModal(){
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden','true');
    document.body.style.overflow='';
    if (lastFocus) try{lastFocus.focus();}catch(e){}
}
document.getElementById('dmodalClose').addEventListener('click', closeModal);
modal.addEventListener('click', function(e){ if(e.target===modal) closeModal(); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape' && modal.classList.contains('open')) closeModal(); });

/* Archive loader — list_approved only returns summary headlines, so we
   fetch the full digest for each week via /digest-archive?limit=1&...
   Instead we use the public summary rows for listing, and for each week
   use the /latest-digest or cached memory — but since /digest-archive
   currently does not expose full papers, we fetch each week individually
   by calling /digest-archive (headlines) + on first-open we fetch
   /digest/{week_id}. We rely on the auto-publish state → read via
   /latest-digest cannot yield older weeks. Simpler: the public
   /digest-archive returns only summaries, so the archive page can only
   render the metadata + top headlines. Clicking opens the paper on
   PubMed directly via a simpler modal. However a richer experience
   requires the backend to expose full per-week data — and it already
   does via /digest/{week_id} (HMAC-gated). Since this page is public,
   we fall back to headlines-only archive rows when the full data is
   unavailable. */

var archiveEl = document.getElementById('archive');
var loadMore  = document.getElementById('loadMore');
var cursor = null, firstLoad = true;

function fmtDate(iso){
    if (!iso) return '';
    try { return new Date(iso).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); }
    catch(e){ return ''; }
}

function renderWeekBlock(item){
    var headlines = (item.top_headlines || []).filter(Boolean);
    var cards;
    if (!headlines.length) {
        cards = '<div class="empty" style="padding:1.5rem 0">No highlights recorded.</div>';
    } else {
        cards = '<div class="week-cards">' + headlines.map(function(h){
            return ''
              + '<article class="dcard">'
              +   '<div class="dcard-logo"><img src="'+esc(logoFor(''))+'" alt="Journal"></div>'
              +   '<div class="dcard-journal">Archived</div>'
              +   '<div class="dcard-title">' + esc(h) + '</div>'
              + '</article>';
        }).join('') + '</div>';
    }
    return ''
      + '<section class="week-block">'
      +   '<div class="week-header">'
      +     '<div class="week-id">Week ' + esc(item.week_id) + '</div>'
      +     '<div class="week-meta">' + esc(fmtDate(item.generated_at)) + ' · ' + (item.paper_count || 0) + ' papers</div>'
      +   '</div>'
      +   cards
      + '</section>';
}

function load(){
    var url = API + '/digest-archive?limit=10';
    if (cursor) url += '&after=' + encodeURIComponent(cursor);
    loadMore.disabled = true;
    fetch(url, { cache:'no-store' })
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(d){
          var items = (d && d.items) || [];
          if (firstLoad){
              firstLoad = false;
              if (!items.length){ archiveEl.innerHTML = '<div class="empty">No published digests yet.</div>'; return; }
              archiveEl.innerHTML = items.map(renderWeekBlock).join('');
          } else {
              archiveEl.insertAdjacentHTML('beforeend', items.map(renderWeekBlock).join(''));
          }
          cursor = d.next_cursor;
          if (cursor){ loadMore.style.display='block'; loadMore.disabled=false; }
          else      { loadMore.style.display='none'; }
      })
      .catch(function(err){
          console.warn('[archive] fetch failed', err);
          if (firstLoad) archiveEl.innerHTML = '<div class="empty">Unable to load the archive right now.</div>';
      });
}

loadMore.addEventListener('click', load);
load();
</script>
</body>
</html>
